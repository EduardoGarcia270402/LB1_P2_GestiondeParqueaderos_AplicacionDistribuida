spring:
  application:
    name: zonas

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parqueaderos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        '[format_sql]': true

server:
  port: ${PORT:8080}
